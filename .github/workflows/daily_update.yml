name: 自動更新匯率與價格機器人

on:
  schedule:
    # 每天台灣時間凌晨 0 點、中午 12 點各自動執行一次
    - cron: '0 16,4 * * *'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 📥 下載目前的專案檔案
        uses: actions/checkout@v3

      - name: 🐍 準備 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 📦 安裝所需套件 (新增 beautifulsoup4)
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz beautifulsoup4

      - name: 🤖 執行全自動爬蟲程式 (update.py)
        run: python update.py

      - name: 💾 將最新資料存回 GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add data.json
          git commit -m "Auto-update latest exchange rates and prices" || echo "No changes to commit"
          git push
