<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球 iPhone 17 比價網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800" id="productTitle">Loading...</h1>
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                document.getElementById('productTitle').innerText = data.currentProductTitle;
                const container = document.getElementById('cardsContainer');
                container.innerHTML = '';

                data.regionsData.forEach(region => {
                    let productsHtml = '';
                    for (const [spec, info] of Object.entries(region.products)) {
                        productsHtml += `
                            <div class="flex justify-between py-1 border-b">
                                <span>${spec}</span>
                                <span class="font-bold">${region.currency} ${info.price.toLocaleString()}</span>
                            </div>
                            <a href="${info.link}" target="_blank" class="block text-center mt-2 bg-blue-600 text-white py-1 rounded hover:bg-blue-700 text-sm">
                                前往查看
                            </a>
                        `;
                    }

                    const card = `
                        <div class="bg-white p-6 rounded-xl shadow-lg">
                            <div class="flex items-center justify-between mb-4">
                                <h2 class="text-xl font-bold">${region.flag} ${region.country} - ${region.platform}</h2>
                            </div>
                            ${productsHtml}
                            <div class="mt-4 text-xs text-gray-500">
                                <p>預估運費: ${region.shipping.text} (${region.shipping.cost})</p>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error('Error loading data:', error);
                document.body.innerHTML = '<h1 class="text-center mt-20 text-red-500">無法讀取資料，請檢查 data.json 格式！</h1>';
            }
        }
        loadData();
    </script>
</body>
</html>
