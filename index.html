<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 3C - 全球跨境比價引擎 (MVP 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .price-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .price-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-globe text-blue-600 text-2xl"></i>
                <h1 class="text-xl font-bold tracking-tight text-gray-900">Global 3C <span class="text-sm font-normal text-gray-500 ml-2 hidden sm:inline">跨境比價引擎</span></h1>
            </div>
            <div class="text-sm text-gray-500 flex items-center gap-2">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>匯率更新: 今日 09:00</span>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 mb-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-900 mb-2">尋找全球最划算的 iPhone 17</h2>
                <p class="text-gray-500">自動為您精算：商品售價 + 國際運費 + 台灣進口營業稅 (5%) = 最終到手價</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                <div class="md:col-span-5 relative">
                    <label for="product" class="block text-sm font-medium text-gray-700 mb-1">選擇商品規格</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-brands fa-apple text-gray-400"></i>
                        </div>
                        <select id="product" class="block w-full pl-10 pr-10 py-3 text-base border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-xl border bg-gray-50 appearance-none cursor-pointer">
                            <option value="128">iPhone 17 - 128GB (各色)</option>
                            <option value="256">iPhone 17 - 256GB (各色)</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-chevron-down text-gray-400 text-sm"></i>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-4 relative">
                    <label for="destination" class="block text-sm font-medium text-gray-700 mb-1">送達目的地 (目前鎖定)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-location-dot text-gray-400"></i>
                        </div>
                        <select id="destination" disabled class="block w-full pl-10 pr-3 py-3 text-base border-gray-200 focus:outline-none sm:text-sm rounded-xl border bg-gray-100 text-gray-500 appearance-none cursor-not-allowed">
                            <option value="TW">台灣 (Taiwan)</option>
                        </select>
                    </div>
                </div>

                <div class="md:col-span-3">
                    <button id="calcBtn" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        <i class="fa-solid fa-calculator"></i>
                        開始精算比價
                    </button>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden flex-col items-center justify-center py-12">
            <i class="fa-solid fa-circle-notch fa-spin text-blue-500 text-4xl mb-4"></i>
            <p class="text-gray-500 font-medium">正在即時運算各國匯率與運費...</p>
        </div>

        <div id="resultsArea" class="hidden">
            <div class="flex items-center justify-between mb-4 px-1">
                <h3 class="text-lg font-bold text-gray-800">比價結果 (由低至高)</h3>
                <span class="text-sm text-gray-500 bg-gray-200 px-2 py-1 rounded-md">貨幣單位: TWD (新台幣)</span>
            </div>
            
            <div id="resultsList" class="space-y-4">
                </div>
        </div>
    </main>

    <footer class="bg-white border-t mt-auto">
        <div class="max-w-5xl mx-auto px-4 py-6 sm:px-6 lg:px-8 text-center text-sm text-gray-400">
            <p>© 2026 Global 3C. 此為概念驗證 (MVP) 測試網頁。</p>
            <p class="mt-1">匯率僅供參考，實際刷卡可能產生約 1.5% 海外交易手續費。</p>
        </div>
    </footer>

    <script>
        // 1. 匯率設定 (基準: TWD)
        const exchangeRates = {
            'TWD': 1,
            'JPY': 0.21,   
            'HKD': 4.1,    
            'KRW': 0.024   
        };

        // 2. 各地區與平台資料庫 (已修改為不同容量獨立連結)
        const regionsData = [
            {
                id: 'tw',
                country: '台灣',
                platform: 'momo 購物網',
                flag: '🇹🇼',
                currency: 'TWD',
                products: {
                    '128': { 
                        price: 28900, 
                        link: 'https://www.momoshop.com.tw/goods/128GB的專屬網址' 
                    },
                    '256': { 
                        price: 32900, 
                        link: 'https://www.momoshop.com.tw/goods/256GB的專屬網址' 
                    }
                },
                shipping: { cost: 0, text: '國內免運' },
                taxRate: 0,
                tags: [
                    { text: '原廠保固', type: 'success', icon: 'fa-shield-halved' },
                    { text: '免運費', type: 'info', icon: 'fa-truck-fast' },
                    { text: '無關稅', type: 'info', icon: 'fa-file-invoice-dollar' }
                ]
            },
            {
                id: 'jp',
                country: '日本',
                platform: 'Amazon JP',
                flag: '🇯🇵',
                currency: 'JPY',
                products: {
                    '128': { 
                        price: 124800, 
                        link: 'https://www.amazon.co.jp/dp/128GB的專屬網址' 
                    },
                    '256': { 
                        price: 139800, 
                        link: 'https://www.amazon.co.jp/dp/256GB的專屬網址' 
                    }
                },
                shipping: { cost: 3500, text: 'Amazon 國際直郵' },
                taxRate: 0.05,
                tags: [
                    { text: '跨區無保固', type: 'warning', icon: 'fa-triangle-exclamation' },
                    { text: '匯率優勢', type: 'success', icon: 'fa-arrow-trend-down' },
                    { text: '預收關稅', type: 'info', icon: 'fa-box-open' }
                ]
            },
            {
                id: 'hk',
                country: '香港',
                platform: 'Apple 官網',
                flag: '🇭🇰',
                currency: 'HKD',
                products: {
                    '128': { 
                        price: 6899, 
                        link: 'https://www.apple.com/hk/shop/buy-iphone/128GB的專屬網址' 
                    },
                    '256': { 
                        price: 7699, 
                        link: 'https://www.apple.com/hk/shop/buy-iphone/256GB的專屬網址' 
                    }
                },
                shipping: { cost: 150, text: '第三方集運 (預估)' },
                taxRate: 0.05,
                tags: [
                    { text: '實體雙卡', type: 'special', icon: 'fa-sim-card' },
                    { text: '跨區無保固', type: 'warning', icon: 'fa-triangle-exclamation' }
                ]
            },
            {
                id: 'kr',
                country: '韓國',
                platform: 'Coupang',
                flag: '🇰🇷',
                currency: 'KRW',
                products: {
                    '128': { 
                        price: 1250000, 
                        link: 'https://www.coupang.com/vp/products/128GB的專屬網址' 
                    },
                    '256': { 
                        price: 1400000, 
                        link: 'https://www.coupang.com/vp/products/256GB的專屬網址' 
                    }
                },
                shipping: { cost: 30000, text: '第三方集運 (預估)' },
                taxRate: 0.05,
                tags: [
                    { text: '跨區無保固', type: 'warning', icon: 'fa-triangle-exclamation' }
                ]
            }
        ];

        const formatMoney = (amount) => Math.round(amount).toLocaleString('en-US');

        const getCurrencySymbol = (currency) => {
            const symbols = { 'TWD': '$', 'JPY': '¥', 'HKD': 'HK$', 'KRW': '₩' };
            return symbols[currency] || '';
        };

        const getTagStyle = (type) => {
            switch(type) {
                case 'success': return 'bg-green-100 text-green-800 border border-green-200';
                case 'warning': return 'bg-amber-100 text-amber-800 border border-amber-200';
                case 'info': return 'bg-gray-100 text-gray-700 border border-gray-200';
                case 'special': return 'bg-purple-100 text-purple-800 border border-purple-200';
                default: return 'bg-gray-100 text-gray-800';
            }
        };

        document.getElementById('calcBtn').addEventListener('click', () => {
            const capacity = document.getElementById('product').value;
            const resultsArea = document.getElementById('resultsArea');
            const resultsList = document.getElementById('resultsList');
            const loading = document.getElementById('loading');

            resultsArea.classList.add('hidden');
            loading.classList.remove('hidden');
            loading.classList.add('flex');

            setTimeout(() => {
                let calculatedResults = [];

                regionsData.forEach(region => {
                    const localPrice = region.products[capacity].price;
                    const currentProductLink = region.products[capacity].link; // 動態取得當前容量的專屬連結
                    const localShipping = region.shipping.cost;
                    const rate = exchangeRates[region.currency];

                    const priceTWD = localPrice * rate;
                    const shippingTWD = localShipping * rate;
                    const cifValue = priceTWD + shippingTWD;
                    const taxTWD = cifValue * region.taxRate;
                    const totalLandingCost = cifValue + taxTWD;

                    calculatedResults.push({
                        ...region,
                        originalPrice: localPrice,
                        currentProductLink: currentProductLink, // 存入動態連結
                        priceTWD: priceTWD,
                        shippingTWD: shippingTWD,
                        taxTWD: taxTWD,
                        totalCost: totalLandingCost
                    });
                });

                calculatedResults.sort((a, b) => a.totalCost - b.totalCost);
                resultsList.innerHTML = '';
                
                calculatedResults.forEach((result, index) => {
                    const isCheapest = index === 0;
                    
                    const tagsHtml = result.tags.map(tag => `
                        <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${getTagStyle(tag.type)}">
                            <i class="fa-solid ${tag.icon} text-[10px]"></i>
                            ${tag.text}
                        </span>
                    `).join('');

                    const detailsHtml = `
                        <div class="mt-4 bg-gray-50 rounded-lg p-3 text-sm grid grid-cols-1 sm:grid-cols-3 gap-2 border border-gray-100">
                            <div class="flex justify-between sm:block">
                                <span class="text-gray-500 block mb-1">商品售價</span>
                                <span class="font-medium text-gray-800">
                                    NT$ ${formatMoney(result.priceTWD)}
                                    <span class="text-xs text-gray-400 font-normal ml-1">(${getCurrencySymbol(result.currency)}${formatMoney(result.originalPrice)})</span>
                                </span>
                            </div>
                            <div class="flex justify-between sm:block">
                                <span class="text-gray-500 block mb-1">國際運費 <span class="text-xs">(${result.shipping.text})</span></span>
                                <span class="font-medium text-gray-800">NT$ ${formatMoney(result.shippingTWD)}</span>
                            </div>
                            <div class="flex justify-between sm:block">
                                <span class="text-gray-500 block mb-1">台灣營業稅 <span class="text-xs">(${result.taxRate * 100}%)</span></span>
                                <span class="font-medium ${result.taxTWD > 0 ? 'text-red-500' : 'text-gray-800'}">
                                    + NT$ ${formatMoney(result.taxTWD)}
                                </span>
                            </div>
                        </div>
                    `;

                    const card = document.createElement('div');
                    card.className = `price-card bg-white rounded-2xl p-5 border ${isCheapest ? 'border-blue-400 ring-1 ring-blue-400 shadow-md relative overflow-hidden' : 'border-gray-200'} fade-in`;
                    card.style.animationDelay = `${index * 0.1}s`;

                    // 將超連結換成 result.currentProductLink
                    card.innerHTML = `
                        ${isCheapest ? '<div class="absolute top-0 right-0 bg-blue-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg">最划算推薦</div>' : ''}
                        
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-2xl" title="${result.country}">${result.flag}</span>
                                    <h4 class="text-lg font-bold text-gray-900">${result.platform}</h4>
                                    <span class="text-sm text-gray-500 border-l border-gray-300 pl-2 ml-1">${result.country}</span>
                                </div>
                                <div class="flex flex-wrap gap-2 mt-2">
                                    ${tagsHtml}
                                </div>
                            </div>

                            <div class="flex flex-col items-start md:items-end md:ml-4 border-t md:border-t-0 pt-4 md:pt-0 mt-2 md:mt-0">
                                <div class="text-sm text-gray-500 mb-1">預估含稅到手價</div>
                                <div class="flex items-baseline gap-1">
                                    <span class="text-xl font-bold text-gray-900">NT$</span>
                                    <span class="text-3xl font-extrabold text-${isCheapest ? 'blue-600' : 'gray-900'}">${formatMoney(result.totalCost)}</span>
                                </div>
                                <a href="${result.currentProductLink}" target="_blank" rel="noopener noreferrer" class="mt-3 w-full md:w-auto text-center bg-gray-900 hover:bg-gray-800 text-white px-6 py-2 rounded-lg text-sm font-medium transition-colors">
                                    前往查看 <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-xs"></i>
                                </a>
                            </div>
                        </div>
                        ${detailsHtml}
                    `;
                    resultsList.appendChild(card);
                });

                loading.classList.remove('flex');
                loading.classList.add('hidden');
                resultsArea.classList.remove('hidden');
                resultsArea.classList.add('fade-in');

            }, 800);
        });

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('calcBtn').click();
            }, 300);
        });
    </script>
</body>
</html>
