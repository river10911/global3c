<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global3C 全球 Apple 商品比價</title>

<meta name="description"
content="全球 Apple 商品價格比較平台">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">
    <div class="container">

    <h1>🌎 Global3C</h1>

    <p>
        全球 Apple 商品比價引擎
    </p>

    <div id="rateStatus"></div>

</div>

</header>

<section class="hero">

<div class="container">

    <h2>
        搜尋全球 Apple 商品價格
    </h2>

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="例如：iPhone 17 Pro">

        <button onclick="searchProduct()">
            搜尋
        </button>

    </div>

    <div class="quick-tags">

        <button onclick="quickSearch('iphone 17')">
            iPhone 17
        </button>

        <button onclick="quickSearch('iphone 17 pro')">
            iPhone 17 Pro
        </button>

        <button onclick="quickSearch('airpods pro')">
            AirPods Pro
        </button>

        <button onclick="quickSearch('macbook air')">
            MacBook Air
        </button>

    </div>

</div>

</section>

<section class="container">

<div id="results"></div>

</section>

<script>

let products = [];
let prices = {};
let exchangeRates = {};

async function loadData(){

    try{

        const productsResponse =
            await fetch("data/products.json");

        products =
            await productsResponse.json();

        const pricesResponse =
            await fetch("data/prices.json");

        prices =
            await pricesResponse.json();

        const exchangeResponse =
            await fetch("data/exchange.json");

        exchangeRates =
            await exchangeResponse.json();

        let text =
"匯率更新：" +
(
    exchangeRates.updated_at ||
    "已載入"
);

if(prices._system){

    text +=
    " ｜ 價格更新：" +
    prices._system.last_price_update;

}

document
.getElementById("rateStatus")
.innerText = text;

    }
    catch(error){

        console.error(error);

        document
            .getElementById("rateStatus")
            .innerText =
            "資料載入失敗";

    }

}

function quickSearch(keyword){

    document
        .getElementById("searchInput")
        .value =
        keyword;

    searchProduct();

}

function convertToTWD(price,currency){

    if(currency==="TWD"){

        return price;

    }

    if(
        !exchangeRates[currency]
    ){

        return 0;

    }

    const usdPrice =
        price /
        exchangeRates[currency];

    return Math.round(
        usdPrice *
        exchangeRates.TWD
    );

}

function formatPrice(
    price,
    currency
){

    switch(currency){

        case "JPY":
            return "¥" +
                price.toLocaleString();

        case "KRW":
            return "₩" +
                price.toLocaleString();

        case "HKD":
            return "HK$" +
                price.toLocaleString();

        case "USD":
            return "US$" +
                price.toLocaleString();

        default:
            return "NT$" +
                price.toLocaleString();

    }

}

function searchProduct(){

    const keyword =
        document
        .getElementById("searchInput")
        .value
        .trim()
        .toLowerCase();

    const resultDiv =
        document
        .getElementById("results");

    const product =
        products.find(item =>

            item.keyword
            .toLowerCase()
            .includes(keyword)

            ||

            keyword.includes(
                item.keyword
                .toLowerCase()
            )

        );

    if(!product){

        resultDiv.innerHTML =
        `
        <div class="empty">
            找不到商品資料
        </div>
        `;

        return;
    }

    const priceData =
        prices[product.id];

    if(!priceData){

        resultDiv.innerHTML =
        `
        <div class="empty">
            尚未建立價格資料
        </div>
        `;

        return;
    }

    const resultPrices =
        Object.values(priceData)
        .map(item => {

            return {

                ...item,

                twd:
                convertToTWD(
                    item.price,
                    item.currency
                )

            };

        });

    resultPrices.sort(
        (a,b)=>
        a.twd-b.twd
    );

    let html =
    `
    <div class="product-header">

        <h2>
            ${product.name}
        </h2>

        <p>
            共找到
            ${resultPrices.length}
            個市場價格
        </p>

    </div>
    `;

    resultPrices.forEach(
        (
            item,
            index
        )=>{

        html +=
        `
        <div class="card">

            <div class="card-top">

                <div>

                    <h3>
                        ${item.platform}
                    </h3>

                    <small>
                        ${item.country}
                    </small>

                </div>

                ${
                    index===0
                    ?
                    '<span class="badge">最便宜</span>'
                    :
                    ''
                }

            </div>

            <div class="local-price">

                ${formatPrice(
                    item.price,
                    item.currency
                )}

            </div>

            <div class="price">

                NT$
                ${item.twd.toLocaleString()}

            </div>

            <a
                href="${item.link}"
                target="_blank"
                class="btn-link">

                前往查看

            </a>

        </div>
        `;

    });

    resultDiv.innerHTML =
        html;

}

document
.getElementById(
    "searchInput"
)
.addEventListener(
    "keypress",
    function(event){

        if(
            event.key==="Enter"
        ){

            searchProduct();

        }

    }
);

loadData();

</script>

</body>
</html>
