<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global3C 全球 Apple 商品比價</title>

<meta name="description"
content="比較台灣、日本、韓國、香港、美國 Apple 商品價格與預估到手價">

<meta name="keywords"
content="iPhone比價,日本iPhone,香港iPhone,Apple比價,全球比價">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="container">
        <h1>🌎 Global3C</h1>
        <p>全球 Apple 商品比價引擎</p>
    </div>
</header>

<section class="hero">
    <div class="container">

```
    <h2>搜尋全球 Apple 商品價格</h2>

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="例如：iPhone 17 Pro">

        <button onclick="searchProduct()">
            搜尋
        </button>

    </div>

    <div class="quick-tags">

        <button onclick="quickSearch('iphone 17')">
            iPhone 17
        </button>

        <button onclick="quickSearch('iphone 17 pro')">
            iPhone 17 Pro
        </button>

        <button onclick="quickSearch('airpods pro')">
            AirPods Pro
        </button>

        <button onclick="quickSearch('macbook air')">
            MacBook Air
        </button>

    </div>

</div>
```

</section>

<section class="container">

```
<div id="results"></div>
```

</section>

<script src="products.js"></script>

<script>

function quickSearch(keyword){

    document.getElementById("searchInput").value = keyword;

    searchProduct();

}

function searchProduct(){

    const keyword =
        document
        .getElementById("searchInput")
        .value
        .trim()
        .toLowerCase();

    const resultDiv =
        document.getElementById("results");

    resultDiv.innerHTML = "";

    const product = products[keyword];

    if(!product){

        resultDiv.innerHTML =
        `
        <div class="empty">
            找不到商品資料
        </div>
        `;

        return;
    }

    const sorted =
        [...product.prices]
        .sort((a,b)=>a.twd-b.twd);

    let html =
    `
    <div class="product-header">

        <h2>${product.name}</h2>

        <p>
            共找到 ${sorted.length} 個市場價格
        </p>

    </div>
    `;

    sorted.forEach((item,index)=>{

        const rank =
        index === 0
        ? `<span class="badge">最便宜</span>`
        : "";

        html +=
        `
        <div class="card">

            <div class="card-top">

                <div>
                    <h3>
                        ${item.flag}
                        ${item.platform}
                    </h3>

                    <small>
                        ${item.country}
                    </small>
                </div>

                ${rank}

            </div>

            <div class="local-price">
                ${item.localPrice}
            </div>

            <div class="price">
                NT$ ${item.twd.toLocaleString()}
            </div>

            <a
                href="${item.link}"
                target="_blank"
                class="btn-link">

                前往查看

            </a>

        </div>
        `;
    });

    resultDiv.innerHTML = html;
}

</script>

</body>
</html>
