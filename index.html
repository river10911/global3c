<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global3C 全球 Apple 商品比價</title>

<meta name="description" content="比較台灣、日本、韓國、香港、美國 Apple 商品價格與即時匯率換算">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="container">
        <h1>🌎 Global3C</h1>
        <p>全球 Apple 商品比價引擎</p>
        <div id="rateStatus"></div>
    </div>
</header>

<section class="hero">
    <div class="container">

```
    <h2>搜尋全球 Apple 商品價格</h2>

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="例如：iPhone 17 Pro">

        <button onclick="searchProduct()">
            搜尋
        </button>

    </div>

    <div class="quick-tags">

        <button onclick="quickSearch('iphone 17')">
            iPhone 17
        </button>

        <button onclick="quickSearch('iphone 17 pro')">
            iPhone 17 Pro
        </button>

        <button onclick="quickSearch('airpods pro')">
            AirPods Pro
        </button>

        <button onclick="quickSearch('macbook air')">
            MacBook Air
        </button>

    </div>

</div>
```

</section>

<section class="container">
    <div id="results"></div>
</section>

<script src="products.js"></script>

<script>

let exchangeRates = {};

async function loadExchangeRates(){

    try{

        const response =
            await fetch(
                'https://open.er-api.com/v6/latest/USD'
            );

        const data =
            await response.json();

        exchangeRates = {
            USD:1,
            JPY:data.rates.JPY,
            KRW:data.rates.KRW,
            HKD:data.rates.HKD,
            TWD:data.rates.TWD
        };

        document.getElementById('rateStatus').innerText =
            '匯率更新：' +
            new Date().toLocaleString();

    }catch(error){

        document.getElementById('rateStatus').innerText =
            '匯率載入失敗';

        console.error(error);

    }

}

function convertToTWD(price,currency){

    if(currency === 'TWD'){
        return price;
    }

    const usdPrice =
        price /
        exchangeRates[currency];

    return Math.round(
        usdPrice *
        exchangeRates.TWD
    );

}

function formatPrice(price,currency){

    switch(currency){

        case 'JPY':
            return '¥' + price.toLocaleString();

        case 'KRW':
            return '₩' + price.toLocaleString();

        case 'HKD':
            return 'HK$' + price.toLocaleString();

        case 'USD':
            return 'US$' + price.toLocaleString();

        default:
            return 'NT$' + price.toLocaleString();

    }

}

function quickSearch(keyword){

    document.getElementById('searchInput').value =
        keyword;

    searchProduct();

}

function searchProduct(){

    if(
        Object.keys(exchangeRates).length === 0
    ){
        alert('匯率尚未載入完成');
        return;
    }

    const keyword =
        document
        .getElementById('searchInput')
        .value
        .trim()
        .toLowerCase();

    const resultDiv =
        document.getElementById('results');

    let product = null;

    for(const key in products){

        if(
            key.includes(keyword) ||
            keyword.includes(key)
        ){
            product = products[key];
            break;
        }

    }

    if(!product){

        resultDiv.innerHTML =
            '<div class="empty">找不到商品資料</div>';

        return;

    }

    const prices =
        product.prices.map(item => {

            return {

                ...item,

                twd:
                convertToTWD(
                    item.price,
                    item.currency
                )

            };

        });

    prices.sort(
        (a,b)=>a.twd-b.twd
    );

    let html = '';

    html +=
        '<div class="product-header">' +
        '<h2>' + product.name + '</h2>' +
        '<p>共找到 ' + prices.length + ' 個市場價格</p>' +
        '</div>';

    prices.forEach((item,index)=>{

        html +=
        '<div class="card">' +

            '<div class="card-top">' +

                '<div>' +

                    '<h3>' +
                    item.flag + ' ' +
                    item.platform +
                    '</h3>' +

                    '<small>' +
                    item.country +
                    '</small>' +

                '</div>' +

                (index===0
                    ? '<span class="badge">最便宜</span>'
                    : ''
                ) +

            '</div>' +

            '<div class="local-price">' +
                formatPrice(
                    item.price,
                    item.currency
                ) +
            '</div>' +

            '<div class="price">' +
                'NT$ ' +
                item.twd.toLocaleString() +
            '</div>' +

            '<a class="btn-link" target="_blank" href="' +
                item.link +
            '">' +
                '前往查看' +
            '</a>' +

        '</div>';

    });

    resultDiv.innerHTML = html;

}

document
.getElementById('searchInput')
.addEventListener(
'keypress',
function(event){

    if(event.key === 'Enter'){
        searchProduct();
    }

});

loadExchangeRates();

</script>

</body>
</html>
